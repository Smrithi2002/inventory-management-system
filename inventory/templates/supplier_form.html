{% extends 'base.html' %}
{% block title %}{% if supplier %}Edit Supplier{% else %}Add Supplier{% endif %} — InvSys{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-truck me-2"></i>{% if supplier %}Edit Supplier{% else %}Add Supplier{% endif %}</h2>
    <a href="{% url 'supplier_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="main-card">
    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-circle me-1"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Supplier Name</label>
                <input type="text" name="name" class="form-control"
                       value="{% if supplier %}{{ supplier.name }}{% elif form_data %}{{ form_data.name }}{% endif %}"
                       placeholder="e.g. PharmaCorp Ltd." required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Contact</label>
                <input type="text" name="contact" class="form-control"
                       value="{% if supplier %}{{ supplier.contact }}{% elif form_data %}{{ form_data.contact }}{% endif %}"
                       placeholder="Phone number">
            </div>
            <div class="col-md-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{% if supplier %}{{ supplier.email }}{% elif form_data %}{{ form_data.email }}{% endif %}"
                       placeholder="email@example.com">
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> {% if supplier %}Update{% else %}Save{% endif %}</button>
            <a href="{% url 'supplier_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
