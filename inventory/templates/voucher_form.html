{% extends 'base.html' %}
{% block title %}Create Voucher — InvSys{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-receipt me-2"></i>Create Purchase Voucher</h2>
    <a href="{% url 'voucher_list' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i> Back</a>
</div>

<div class="main-card">
    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-circle me-1"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label d-flex justify-content-between">
                    Supplier
                    <button type="button" class="btn btn-link p-0 text-decoration-none small" data-bs-toggle="modal" data-bs-target="#newSupplierModal">
                        <i class="bi bi-plus-circle me-1"></i>New
                    </button>
                </label>
                <select name="supplier" class="form-select" id="supplier_select" required>
                    <option value="">— Select Supplier —</option>
                    {% for supplier in suppliers %}
                        <option value="{{ supplier.id }}"
                            {% if form_data and form_data.supplier == supplier.id|stringformat:"d" %}selected{% endif %}>
                            {{ supplier.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Invoice Number</label>
                <input type="text" name="invoice_number" class="form-control"
                       value="{% if form_data %}{{ form_data.invoice_number }}{% endif %}"
                       placeholder="e.g. INV-2026-001" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Invoice Date</label>
                <input type="date" name="date" class="form-control"
                       value="{% if form_data %}{{ form_data.date }}{% endif %}" required>
            </div>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="newSupplierModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Add New Supplier</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="modal-error" class="alert alert-danger d-none"></div>
                        <input type="text" id="new-supplier-name" class="form-control" placeholder="Supplier Name">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="save-supplier-btn">Save Supplier</button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('save-supplier-btn').addEventListener('click', function() {
                const name = document.getElementById('new-supplier-name').value.trim();
                const errorDiv = document.getElementById('modal-error');
                
                if (!name) {
                    errorDiv.textContent = "Name is required.";
                    errorDiv.classList.remove('d-none');
                    return;
                }

                const formData = new FormData();
                formData.append('name', name);
                formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

                fetch("{% url 'api_add_supplier' %}", {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const select = document.getElementById('supplier_select');
                        const option = new Option(data.name, data.id, true, true);
                        select.add(option);
                        
                        // Close modal
                        const modal = bootstrap.Modal.getInstance(document.getElementById('newSupplierModal'));
                        modal.hide();
                        
                        // Reset form
                        document.getElementById('new-supplier-name').value = '';
                        errorDiv.classList.add('d-none');
                    } else {
                        errorDiv.textContent = data.error;
                        errorDiv.classList.remove('d-none');
                    }
                });
            });
        </script>

        <div class="mt-4">
            <button type="submit" class="btn btn-success"><i class="bi bi-plus-lg me-1"></i> Create & Add Items</button>
        </div>
    </form>
</div>
{% endblock %}
